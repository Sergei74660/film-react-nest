server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API бэкенда
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Статический контент (постеры фильмов и т.п.), раздаётся бэкендом
    location /content/ {
        proxy_pass http://backend:3000;
    }

    # Собранный фронтенд (SPA) — все остальные пути отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
